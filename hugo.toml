languageCode = "en-us"
theme = "prism-lab"

[markup.goldmark.renderer]
  unsafe = true

[params]
  description = "IoT Prism Laboratory — research on next-generation pervasive IoT systems at the University of Bologna. Ubiquitous sensing, edge intelligence and decentralised data management."
  heroTitle = "Pervasive IoT systems,"
  heroTitleAccent = "refracted into a spectrum of research."
  heroSubtitle = "We work on the device-to-cloud continuum: edge intelligence, web-of-things interoperability, robotic sensing, blockchain trust and context-aware computing — from a single brief to applied projects with industry."
  feedLinks = true


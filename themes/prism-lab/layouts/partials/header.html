<header class="site-header" role="banner">
  <div class="header-inner">
    <a href="{{ "/" | relLangURL }}" class="brand" aria-label="{{ .Site.Title }} — home">
      {{ partial "brand.html" . }}
      <span>
        {{ .Site.Title }}
        <span class="brand-text-muted">University of Bologna</span>
      </span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="nav-toggle-btn" aria-label="Toggle navigation"><span></span></label>

    {{ partial "menu.html" . }}

    <div class="nav-tools">
      <button type="button" class="icon-btn theme-toggle" data-theme-toggle aria-label="Toggle colour scheme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</header>

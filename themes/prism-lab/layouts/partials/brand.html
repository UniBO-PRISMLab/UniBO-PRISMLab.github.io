{{- /* Compact prism mark used in the header and footer.
       Uses currentColor for the structure so it inherits the brand link colour;
       the spectrum rays carry the literal brand spectrum. */ -}}
<svg class="brand-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- incoming beam -->
  <path d="M2 14 L9 14" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" opacity="0.7"/>
  <!-- prism -->
  <path d="M10 5 L20 14 L10 23 Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
  <!-- refracted rays -->
  <line x1="20" y1="14" x2="26" y2="9"  stroke="oklch(72% 0.20 360)" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="26.5" y2="14" stroke="oklch(72% 0.18 290)" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="26" y2="19" stroke="oklch(82% 0.16 200)" stroke-width="1.25" stroke-linecap="round"/>
</svg>

{{- /* Hero illustration: a beam entering a triangular prism and refracting
        into a spectrum. The literal use of the brand metaphor — kept
        intentionally restrained (no glow, no orbital ring) so it reads as a
        diagram rather than decoration. */ -}}
<div class="prism-art" aria-hidden="true">
  <svg viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Prism face: barely-tinted glass against the page bg -->
      <linearGradient id="prism-face" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"   stop-color="oklch(82% 0.16 200)" stop-opacity="0.10"/>
        <stop offset="50%"  stop-color="oklch(72% 0.18 290)" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="oklch(72% 0.20 360)" stop-opacity="0.10"/>
      </linearGradient>
    </defs>

    <!-- incoming beam (single neutral line) -->
    <path d="M30 190 L130 190"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <circle cx="30" cy="190" r="2.5" fill="currentColor" opacity="0.7"/>

    <!-- prism body -->
    <path d="M140 80 L260 190 L140 300 Z"
          fill="url(#prism-face)"
          stroke="currentColor" stroke-width="1.25" stroke-linejoin="round" opacity="0.85"/>

    <!-- refracted rays — six bands of the visible spectrum -->
    <g stroke-width="1.75" stroke-linecap="round" opacity="0.95">
      <line x1="260" y1="190" x2="360" y2="115" stroke="oklch(72% 0.20 360)"/>
      <line x1="260" y1="190" x2="362" y2="145" stroke="oklch(72% 0.20 330)"/>
      <line x1="260" y1="190" x2="362" y2="175" stroke="oklch(72% 0.18 290)"/>
      <line x1="260" y1="190" x2="362" y2="205" stroke="oklch(78% 0.16 240)"/>
      <line x1="260" y1="190" x2="362" y2="235" stroke="oklch(82% 0.16 200)"/>
      <line x1="260" y1="190" x2="360" y2="265" stroke="oklch(82% 0.16 145)"/>
    </g>

    <!-- terminal dots on each ray, optional grace note -->
    <g fill="currentColor" opacity="0.4">
      <circle cx="360" cy="115" r="1.5"/>
      <circle cx="362" cy="145" r="1.5"/>
      <circle cx="362" cy="175" r="1.5"/>
      <circle cx="362" cy="205" r="1.5"/>
      <circle cx="362" cy="235" r="1.5"/>
      <circle cx="360" cy="265" r="1.5"/>
    </g>
  </svg>
</div>

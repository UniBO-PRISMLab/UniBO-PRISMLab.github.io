<!doctype html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a href="#content" class="skip-link">Skip to content</a>

  {{ partial "header.html" . }}

  <main id="content" role="main">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script src="{{ "js/theme.js" | relURL }}" defer></script>
</body>
</html>

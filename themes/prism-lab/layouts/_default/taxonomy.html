{{ define "main" }}
  <section class="section">
    <header class="page-header">
      <h1 class="page-title">{{ .Title }}</h1>
      {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
    </header>

    {{ with .Content }}<div class="page-content prose">{{ . }}</div>{{ end }}

    <div class="posts-list" style="margin-top: var(--space-xl);">
      {{ range .Pages }}
        {{ partial "post-card.html" . }}
      {{ end }}
    </div>
  </section>
{{ end }}
